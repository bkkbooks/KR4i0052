body:
  text: 頤山詩話詩文評類提要臣等謹案頤山詩話一卷明安磐撰磐字公石頤山其號也嘉定州人𢎞治乙丑進士官至兵科給事中其論詩以嚴羽為宗其中如以海棠為杜甫母名尚沿小説之訛又以朝扣富兒門四句譏杜甫致君堯舜之妄亦失之於固所載譏陳循詩嘲裁傳奉官詩亦皆近乎小説無關詩法至其議莊昶溪邊鳥共天機語杖上梅挑太極行句論梅堯臣歌欲論長恨人將問少君句及排周紫芝論林逋梅詩則固詩家公論也磐亦工於吟咏王士禎池北偶談嘗載其數篇頗婉約可誦是書明史藝文志作二卷此本僅一卷而首尾完具殆史偶誤歟乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀頥山詩話原序頥山老農曰夫詩言志詩話又以論詩也故詩難而論詩又難也夫作者皆稟靈含異各充其極縟旨綺文情變氣殊故以淺涉者不能深以泛獵者不能得以已見者不能該以辭類者不能達意詭於本指鑒左于微向其於標能振芳益逺哉夫立標以示表也啓鑰以開户也世之論詩者低昂衆製商榷前藻乃復繼之曰豫嘗擬之云又曰豫嘗有詩云此何以稱焉競長呈伎激賞邀聲此與夫耀色者何異焉林居多暇喜與學士大夫談談又多詩學士大夫退輒録之稍有得焉定其初見或進焉畢其説他日倘庶幾哉將論詩者之所不廢也嘉靖戊子秋九月朔日頥山老農書頤山詩話原序
