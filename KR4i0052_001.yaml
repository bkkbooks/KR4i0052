  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0052_WYG_001-1a, image: WYG1482/WYG1482-0461a.png}
body:
  text: 頥山詩話明安磐撰詩豈易言哉竒者詭而不法興者僻而不遂麗者綺而不合賦者直而不深淡者枯而不振比者泛而不揆苦者澀而不入達者肆而不制巧者藻而不壯質者俚而不華豐者奢而不節約者陋而不變循者失之剽新者失之怪振者失之誇徑者失之淺速者失之率奧者失之沉詩之難如此三百篇尚矣三代而下如曹劉風骨之古李杜選律之備其庶幾焉世之程才藝苑獻最吟壇者非不精騖八極心逰無始日摛前藻心企往躅然而詠髙歷賞離衆絶致者蓋不多見詎非難歟造化人事有有則有無有全則有偏有盛則有衰一時風聲氣習例足以振起亦足以頽墮漢以文盛唐以詩盛宋以道學盛以聲律論之則不能兼焉漢無騷唐無選宋無律所謂無者非真無也或有矣而不純或純矣而不多雖謂之無亦可也詩如參禪有彼岸有苦海有外道有上乘迷者不能登彼岸沉者不能出苦海魔者不能離外道凡者不能超上乘雖不離乎聲律而實有出於聲律之外嚴滄浪所謂一味妙悟者蓋為是也木蘭詞古今人以為髙古然不知為唐人之擬作也詞中萬里赴戎機關山度若飛朔氣傳金柝寒光照鐵衣將軍百戰死壯士十年歸皆唐人語且可汗唐蕃國天子之號故知為唐人之擬作也豫反復其詞中間有可疑處壯士十年歸歸來見天子唐制無十年征戍之兵而一卒之微未必得見天子可疑者此也有矛盾處既曰歸來見天子天子坐明堂是漢人矣又曰可汗問所欲則是蕃人矣既為可汗可汗之制安有尚書郎之名哉自相矛盾者此也況同行十二年言動起居豈無一事足以發露不知木蘭是女郎未必然也豈寓言者歟古辭陌上桑曰日出東南隅照我秦氏樓秦氏有好女自名為羅敷傅玄改為艷歌行首四句全與此同但改名為字古辭曰頭上倭墮髻耳中明月珠緗綺為下裙紫綺為上襦傅玄曰首戴金翠飾耳綴明月珠白素為下裾丹霞為上襦古辭曰使君從南來五馬立踟蹰使君遣吏往問是誰家姝傅玄曰使君自南來駟馬立踟蹰遣吏謝賢女豈可同行車古辭曰羅敷前致辭使君亦何愚使君自有婦羅敷自有夫傅玄曰斯女長跪對使君言何殊使君自有婦賤妾有鄙夫首尾皆襲其語而韻亦同不知何也劉裕九日遊戲馬臺令寮佐賦詩送孔靖謝宣逺曰聖心眷嘉節揚鑾戾行宫謝靈運曰良辰感聖心雲旗興暮節是時裕方以宋公建臺而二子俱稱為聖亦猶漢帝尚在而公幹以曹操為元后仲宣以操為聖君也君臣之義不明久矣何惟其然哉曹丕建章臺公宴詩王粲曰嘗聞詩人語不醉且無歸應瑒亦曰為且極歡情不醉其無歸子建曰公子敬愛客終宴不知疲瑒亦曰公子敬愛客樂飲不知疲一時燕集之作相襲如此豈偶然同耶張茂先勵志山不讓塵川不辭盈勉爾含𢎞以隆德聲髙以下基洪由纎起川廣自源成人在始又曰復禮終朝天下歸仁進德修業暉光日新三百篇後能以義理形之聲韻以自振者才見此耳晉風浮蕩不檢茂先以聖賢自勵可謂獨立不羣矣史稱其自少修謹造次必以禮度有由然哉陸士衡之詩鍾嶸謂為太康之英安仁景陽為輔與陳思謝客並稱嚴羽謂士衡獨在諸公之下二者孰是試參之蓋士衡綺練精絶學富而辭贍才逸而體華嶸之論亦是若以風骨氣格言之是誠在曹劉二張左阮之下也古人一句詩稱振絶者如枯桑知天風如海日生殘夜下此如滿城風雨近重陽之句然未若謝客之池塘生春草也少日讀此不解中嵗以來始覺其妙意在言外神交物表偶然得之有天然之趣所以可貴謝客自謂殆有神助非虛語也今觀謝客諸作皆精練似此者絶少信乎有神助也徐凝瀑布詩自謂得意張祜地勢遙尊嶽河流側讓關樹影中流見鐘聲兩岸聞足稱佳句凝曰美則美矣何如老夫今古長如白練飛一條界破青山色潘若沖雅談亦謂凝瀑布詩膾炙人口至東坡始不然之曰飛流濺沫知多少不為徐凝洗惡詩謂為惡詩似過然語意鄙俗未足為佳而凝之自負與時之膾炙者何也然凝詩亦有好處如逺客逺遊新過嶺每逢芳樹問芳名長林遍是相思樹爭遣愁人獨自行又天下三分明月夜二分無賴是揚州亦佳句也李西涯云謝方石好用夢字笑字每以語之不易也然不知方石尤好用敢字極知字十詩常七八有之比之夢字笑字為尤多西涯偶未之覺耳西涯云子瞻詩傷於快直少委曲沉著之意以此有不逮古人之誚雖后山亦謂其失之粗以其得之易也愚謂傷快直率易固然但坡翁好用事甚者句句以事襯貼如賀陳章生子張子野買妾戲徐孟不飲之詩是也劉辰翁謂黃太史盛欲用萬卷書與古人爭能於一字然不知意多而情逺句纍而格近也鍾嶸云任昉博物動輒用事所以詩不能竒然則用事不可耶少陵讀書破萬卷下筆如有神未嘗不用事而渾然不覺乃為髙品也謝康樂之詩雖是涉于對偶然而森蔚璀瑋繁密錯縟一句一字極其深思昔人謂無一篇不佳今觀其入彭蠡華山岡七里瀨始寧墅富春渚諸詩模寫行役江山歷歷如畫信一代之偉作也其中初發石首城一詩尤妙稍尚風骨不類諸作有建安之風豈其被誣見釋之後情發之真歟此詩之所以貴情性也西涯嶽陽樓吳楚乾坤天下句江湖廊廟古人情或駁之曰杜子妙在坼與浮字西涯失之彭民望曰然則必云吳楚東南坼乾坤日夜浮天下句而後可邪或者之説信不可然病不在吳楚乾坤也曰天下句詩語固如是乎白樂天與元微之劉禹錫同論南朝興廢各賦金陵懷古禹錫詩成樂天曰四人探驪龍子先獲珠所餘鱗介何用於是罷唱又與張汝士迎楊於陵席上賦詩汝士後成元白覽之失色又與汝士于裴令公宴上賦詩元白有德色次至汝士曰昔日蘭亭無艷質此時金谷有髙人白知不能加遽裂之曰笙歌鼎沸勿作冷淡生活元顧白曰樂天可謂能全名矣由此數事觀之樂天豈亦忌才邪不然記録者之失真也若太白過黃鶴樓曰眼前有景道不得崔皓題詩在上頭可謂能服善矣詩有屬對未能而他人代之者如范曽云歲暮天涯雨久而莫屬劉郇伯曰何不對人生分外愁晏元獻曰無可奈何花落去經年未嘗強對王琪應聲曰似曽相識燕飛來中書出對曰水底月如天上月久未有對楊文公以事至應聲曰眼中人是面前人王丞相云馬子山騎山子馬久之人對曰錢衡水盜水衡錢天若有情天亦老人以為竒絶無對石曼卿曰月如無恨月長圓唐詩曰二十四考中書令無對之者或以問王平甫平甫應聲曰萬八千戶冠軍侯王荆公集句得江州司馬青衫濕久未有對一日問蔡天啓天啓應聲曰何不對梨園弟子白髮新荆公大喜數者皆索之歲月了不可得而屬對者往往出于卒然之頃且下句每勝上句豈人之才思遲速固自不同歟抑構思者之沉吟反不如偶然者之會意也唐費冠卿感懷詩煢獨未為苦求名始辛酸上國無交親請謁多少難又九月風到面羞汗成氷片求名俟公道名與公道逺後舉進士母卒感之甘隱九華山徵詔不起賦詩云君親同是先王道何如骨肉一處老也知臣子合佐時自古榮華誰可保此二詩何前之淺陋而後之峻絶也豈暮年聞道之故歟王元之錫宴明日詩宴罷歸來日未斜平原坊裏那人家幾多紅袖迎門笑爭乞叉頭利市花清明詩無花無酒過清明興味蕭然似野僧昨日鄰家乞新火曉窗分與讀書燈胡苕溪云老少情懷之異此二事正相類云近世詩人見古人佳句輒欲擬作自謂得意甚者筆之於書以誇乎人然而何嘗得其倣佛乾鼠為璞蹄涔自濡殊可笑也歐陽永叔嘗愛常建竹徑通幽處禪房花朩深欲效之作一聯每不可得晚至青州得山齋宴息益欲作之竟不能獲一言至以為終身之恨以歐公之才何所不可乃不輕易如此兹其可重也歟石首楊文定公好題竹贈人亦其性然也今見于集者凡三十六絶然無甚佳者詩之難如此哉杜子美贈韋左丞中頗自負云讀書破萬卷下筆如有神賦料揚雄敵詩看子建親李雍求識面王翰願卜鄰繼之曰自謂頗挺出立登要路津致君堯舜上再使風俗淳不知子美以上所云辭賦足以致君歟抑别有道也末云朝扣富兒門暮隨肥馬塵殘杯與冷炙到處潛悲辛衰颯不振致君堯舜者恐不如此也今人以為出于子美便不敢雌黃亦過矣豫與韓子爵遊凌雲時二月中旬也寺僧煮茗色香殊絶豫笑謂子爵曰古來詠佳人者多以海棠豆蔲牡丹為言俱未若凌雲茗之為近也安得數語發其義哉後讀東坡寄壑源焙新芽詩有曰仙山靈雨濕行雲洗遍香肌粉未勻明月來投玉川子清風吹破武陵春要知玊雪心腸好不是膏油首面新戲作小詩君一笑從來佳茗似佳人乃知古人先有此意矣蘇集云黃落山川知晚秋小蟲催女獻功裘老松閲世卧雲壑挽著滄江回萬牛詩林以為山谷之詩然山谷又有和少遊詩苐二句與此全同玩其辭氣當為山谷之詩而誤入蘇集也謝翺有懷峨眉家先生詩小序先生曽宰建之浦城詩云露下濕百草病思生積愁窟泉春洗屐氈雪莫登樓魂夢來巴峽衣冠老代州平生仗忠信自與身為讐則家先生者蓋余峨眉人而寓於代者惜乎名字行履不可考然觀仗忠信之語其人亦自不同也近時松石詩評自謂平章丰致水鑑聲猷華衮英靈節旄間氣晉宋六朝如王融徐陵隂庾皆入品題而李陵潘石二張二陸茂先景純仲文叔源皆一時名家乃遺而不收况人著數語祗以取譬為髙體裁聲韻多不中的而劉因虞集髙下之間未為定論識詩之難如此西涯云晦翁深於古詩其效漢魏至字字句句平仄髙下亦相依倣後見晦翁答鄭文振言向見擬古將謂只是學古人之詩元來却是學古人説話意思語脈皆要似他只換却字某後來依如此做得二三十首詩便覺得長進蓋意思句語血脈勢向皆效之也觀於此言益信西涯之説夫以晦翁學作古詩乃如此精密用功後之人以鹵莽之識動云學選吾未見其可也集句始于宋人王荆公為妙荆公集句近百首胡笳十八拍為妙黃山谷謂王慎中擬半山集句十八拍會合宛轉能道文姬心事惜其今不傳也文文山亦有十八拍集句意不逮荆公其體製聲氣俱非文姬口中語在燕時集句甚富集中五言絶句至二百餘首豫讀之往往不終卷而淚下然二公所集皆無七言律詩豈屬對之精當在二公亦難耶沈存中謂荆公集句多至百韻對偶精切過於本詩今其集無百韻者豈其集有所遺耶近時如夏宏之聫錦童郎中之梅花集沈行之詠雪集牽合餖飣而意不相屬吾無取焉耳莊定山云天地以來元有此蓬萊之外更無山李西涯録為佳句國初王當宗詩三代以來方有學六經之外更無書定山毋乃太相襲歟近見謝方石集有唐舜以來皆是道許巢之外更誰班兩漢以來皆智力六經之外幾刪修秦晉以來寧有治虞周之上不同風方石未免坐此病也成化中有陳大學士卒忘其名京師人以詩吊之曰聞道先生已蓋棺薤歌聲裏萬人歡填門客散名猶在負郭田多死亦安鹽井已非當日利氷山無復昔時寒九原若遇南陽李為道羅倫已復官可謂極罵矣蓋棺論定吁可畏哉嘉靖初下詔裁革傳奉中書舍人時有集杜詩嘲之者曰馬上誰家白面郎初聞涕淚滿衣裳可憐懷抱向人盡正想氤氲滿眼香近侍只今難浪迹青春作伴好還鄉三年奔走空皮骨愁日愁隨一線長亦詼謔可笑子美愁極本憑詩遣興詩成吟咏轉凄涼蓋用鮑明逺長歌欲自慰彌起長恨端之意也謝康樂徒作千里曲絃絶念彌敦語意尤覺簡逺楊月湖方震選陳公甫莊孔陽之詩謂其别出新格髙處不論唐人二家全集不暇詳論就其所選其卓然過唐者余亦未見也二公詩本學堯夫公甫興致儘髙孔陽一味怒罵較之堯夫安間宏闊已不同矣月湖云子美穿花蛺蝶深深見點水蜻蜓款款飛視孔陽溪邊鳥共天機語擔上梅挑太極行尚隔幾塵以是知工於辭而淺於理者之未足貴也月湖所謂髙於唐人者以此豫謂不然蛺蝶之穿花蜻蜓之點水各具一太極各自一天機亦鳶飛魚躍之意也奚必待説天機太極始謂之言理哉且穿字更著深深字點字更著款款字微妙流轉非餘子可到就以理言擔挑太極全不成語也司馬相如美人賦辭與意皆祖宋玉風賦賦之卒章曰吾寧殺人之父孤人之子不敢愛主人之女美人賦曰弱骨豐肌時來親臣臣乃氣服于內心正于懷信誓旦旦秉志不回凛然若有魯男子之風者豈其見惑文君之後悔而作此以自表歟悲夫莫及矣本朝詩在國初髙楊張徐可比唐初王楊盧駱及乎𢎞治正德之間英才繼起各以其能追配古作直欲越元嘉而上之洋洋乎盛矣哉此非豫之侈論也具眼者當自知之思入于渺忽神恍乎有無情極乎真到才盡乎形聲工奪乎造化者詩之妙也試以杜詩言之子規夜啼山竹裂王母晝下雲旗翻非入于渺忽乎織女機絲虛夜月石鯨鱗甲動秋風非恍乎有無乎艱難苦恨繁霜鬢潦倒新停濁酒杯非極其真到乎五更鼓角聲悲壯三峽星河影動搖非盡其形聲乎白摧朽骨龍虎死黑入太隂雷雨垂非工奪造化乎俞紫芝夜深童子喚不起猛虎一聲山月髙王荆公甚稱之乃和其韻曰新詩比舊仍增峭若許追攀莫太髙則紫芝誠若有不及者以豫觀之辭氣輕佻無老成之意而荆公賞之如此豈各有見歟陳后山黃樓銘體裁倣佛元次山中興頌但頌則三句三韻而銘則三句才用一韻又通篇是一韻兹為少異頌宏闊典雅銘則縝密但規款差小豈所紀事有不同耶東坡謫居齊安妓有李宜常侍宴集他妓俱得坡詩惟宜以語訥不得坡去齊安宜哀請甚力坡有詩曰東坡居士文名久何事無言及李宜恰似西川杜工部海棠雖好不吟詩坡老於是失言矣子美無海棠詩者以母諱海棠耳安可引用以與一妓哉西郊詩話謂體物語形於詩句如許渾荆樹有花兄弟樂橘林無實子孫忙語亦工矣栁子厚蒔藥間庭延國老開尊虛室值賢人語尤自在而韻勝至東坡豈意青州六從事化為烏有一先生則上下意相關而語益竒豫以為一解不如一解子厚涉于牽合東坡涉于嘻戲俱不若用晦之作雖俳比而不覺焉𢎞治中京師語曰禮部三尚書一枚黃老翰林十學士五箇白丁黃老謂道士崔志端以太常卿兼禮書也五白丁則豫忘之黃老白丁亦的對云賈島初為僧退之見其詩令其還俗俞紫芝有詩名欲為僧荆公欣然為置祠部約日祝髮而紫芝不果二公何所見不同至饒德操以一時風雅之英竟落髮為僧甚矣宋人之溺於佛也而一時交遊如吕紫薇謝無逸潘大臨韓子蒼諸賢亦豈能辭其責哉聰聞復為行童坡令作昏字詩聰曰千點亂山橫紫翠一鈎新月挂黃昏坡大稱賞曰不減唐人然不能用韓賈故事兹亦可恨也白樂天玉顔寂寞淚闌干梨花一枝春帶雨之句後人纍纍以調笑解紛東坡送人小詞云故將别語調佳人要看梨花枝上雨韓待制戲為詩曰昔日緹縈亦如許盡道生男不如女河陽滿縣皆春風忍使梨花偏帶雨妓持此詩投縣令其父乃得釋二詩皆出於樂天而新竒流動尤可喜也竹坡老人曰和靖梅花詩疏影橫斜水清淺暗香浮動月黃昏東坡云紛紛初疑月挂樹耿耿獨與參橫昏此語一出和靖氣索然矣張文潛云調鼎當年終有實論花天下更無香雖未及坡之髙妙猶可使和靖作牙官胡份云絶艷更無花得似暗香唯有月明知使醉翁見之未必專賞和靖也老人殆未知詩者梅詩須讓和靖東坡别有一段風味張胡之詩未見佳處張詩上句劣胡詩下句劣也唐自中宗玄宗多與羣僚倡和宸筵卺席無不景從雜以宫嬪貴主無復內外之辨曲水臨渭亭立春上已昆明溫泉幸安樂公主公主滿月十月誕辰大明殿兩儀殿東堂聫句諸詩是已流連光景競尚聲樂甚至渾脫回波八風之舞禮法蕩然殊可嘆也獨開元十六年自擇諸州刺史敕宰相諸王御史以下祖道洛濵具太常樂帛舫水嬉令賦詩而玄宗自為詩令髙力士賜之愛民擇吏之意為後世之所僅見未可以一時浮侈少之唐景龍中沈宋李嶠蘇頲岑羲盧藏用諸公每宴必侍侍必有詩大率多媚辭取悅無復詩人規戒之意于時獨郭山惲只誦鹿鳴蟋蟀二詩李日知安樂公主第其卒章曰所願但知居者樂無使時稱作者勞李景伯曰回波爾時酒巵微臣職在針規侍宴既過三爵喧譁竊恐非宜三臣者斯謂矯矯矣唐寧王取賣餅之妻厚有所遺妻後見餅師淚下若不勝情王維詩曰莫以今時寵難忘異日恩看花滿眼淚不共楚王言王乃歸餅師以終其志崔郊鬻婢于連帥得錢四十萬後郊見婢出遊婢泣誓不巳郊贈以詩曰公子王孫逐後塵緑珠垂淚濕羅巾侯門一入深如海從此蕭郎是路人連帥得詩即還其婢仍厚為奩飾此二事寧王與連帥可謂過而能改抑情申義矣趙嘏浙西有美姬惑之計偕浙帥奄有之嘏及第以一絶針之曰寂寞堂前日又曛陽臺去作不歸雲當時聞説沙叱利今日青娥屬使君帥不自安遣一介歸之事雖相類而義則不同也古今為詩話者往往標致已作如張表臣珊瑚詩話每引一事輒以已詩附其後曰豫有詩云云其論元微之謂詩人豪氣例愛矜誇及其自為詩話乃復如此殊不可曉宋髙英秀好譏病古人詩如謂杜荀鶴今日偶題題便著不知題後更誰題此衛子詩也不然安有四蹄豫不知衛子為何物及讀張表臣詩話曰呼驢曰衛不知所本豈衛地多驢邪然後知衛為驢也唐人喜押人字韻然在各集中皆為警句如飛入宫牆不見人楊栁青青渡水人遍插茱茰少一人西出陽關無故人客中時有洛陽人春來多有江上人出門俱是看花人猶作長安下第人從此蕭郎是路人隔花催喚打魚人纍貌尋常行路人試問西河斫桂人如此甚多不能悉記也陳白沙公甫隱居不仕成化𢎞治中甚有高名然公自禪學其詩亦然如曰人世萬緣都大夢天機一點也長生諸君試向東南望何處凌空拄杖飛天涯放逐渾間事消得金剛一部經無奈華胥留不得起馮香几讀楞嚴之類是也若論其興致之髙自成一家可以振響流俗亦一時之英不可誣也賈島客舍并州已十霜歸心日夜憶咸陽無端又渡桑乾水却望并州是故鄉謝疊山曰旅寓十年一旦别去能無依依之意故望并州為故鄉也楊方震曰并州去咸陽已逺桑乾尤逺反并州以近咸陽且不可得況於歸咸陽而可得哉詩意如此謂其久客眷戀豈其情哉疊山固非方震亦未盡也賈島久寓并州不得返咸陽日夜憶之此詩渡桑乾以入并州若誠以并為故鄉者并非故鄉而以為故鄉久客無聊之意可想見矣只如此説似更直切劉呆齋以淵博之學英敏之才發為文章抑揚辨博名蓋一時獨於韻語若未解然者世固有詩不如文如韓退之蘇子瞻曾子固者特其聲響格調之間差弱耳未甚相逺也呆齋往往多纍句俗語與其文若出二手丘瓊臺亦然客有問二公之詩偶然及此非敢輕議前輩也陶淵明詩沖淡深粹出於自然人皆知之至其有志聖賢之學人或不能知也其詩曰先師遺訓豫豈云墜四十無聞斯不足畏又曰朝與仁義生夕死復何求又曰羲農去我久舉世少復真汲汲魯中叟彌縫使其淳又曰先師有遺訓憂道不憂貧瞻望邈難逮轉欲志長勤豫謂漢魏以來知遵孔子而有志聖賢之學者淵明也故表而出之太白詩起句古人謂之開門見山其實初若稍緩至結束處便峻絶不可當明月出天山憶昔洛陽董糟丘黃鶴髙樓已捶碎之外如懷仙歌行路難雲臺歌夢遊天姥南陵别兒童入京之類是也風吹栁花滿店香山谷云未是太白吳姬壓酒勸客嘗壓字人亦難及金陵子弟來相送欲行不行各盡觴不同請君試問東流水别意與之誰短長此真太白妙處也落日欲沒峴山西倒著接㒿花下迷永叔云此常語也明月清風不用一錢買玉山自倒非人推然後見太白之橫放所以驚動千古者固在此也合是二説觀之益信太白山鷓鴣詞語意俱苦至末句云紫塞嚴霜如劍戟蒼梧欲巢難背違我心誓死不能去哀鳴警呌泪沾衣豈永王南巡被脅時作邪其情亦可見矣石崇以緑珠死喬知之有妾曰碧玉為武承嗣所奪知之作緑珠怨末云百年離别在髙樓一代紅顔為君盡寄意碧玉碧玉赴井死承嗣得詩于衣帶竟以他事坐知之族誅緑珠死于未收之日碧玉死于已奪之後二妾固自有優劣而季倫以婦人賈禍知之乃蹈覆轍可哀也李清詩云當時若與緑珠去猶有無窮歌舞人其語淺曹鄴云若遣緑珠醜石家應尚存可謂名言矣梅聖俞溫成皇后挽詞歌欲傳長恨人將問少君賦一代母后之詩而以致寇失國之貴妃比之不恭甚矣題畫詩吳融經年蝴蝶飛不去纍歲桃花結不成此學究語也太白遊雲不知歸日見白鷗在此中冥昧失晝夜隱几寂聽無鳴蟬非不是此意而迥出如此大抵畫詩雄渾精妙無出老杜次惟太白如族弟燭照山水畫歌趙少府粉圖山水全篇飛動跌宕真名筆也頤山詩話
